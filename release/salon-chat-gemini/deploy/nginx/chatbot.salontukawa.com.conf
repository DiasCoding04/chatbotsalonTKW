# TLS termination + reverse proxy cho Node app (127.0.0.1:8787).
# Sau khi copy vào sites-available, chạy certbot rồi nginx -t && systemctl reload nginx.

server {
    listen 80;
    listen [::]:80;
    server_name chatbot.salontukawa.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chatbot.salontukawa.com;

    ssl_certificate /etc/letsencrypt/live/chatbot.salontukawa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.salontukawa.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
